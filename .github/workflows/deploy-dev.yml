name: 🧪 Deploy DEV

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish FCOldBoysTeamSelector/FCOldBoysTeamSelector.csproj -c Release --output publish

      - name: Set base href for DEV environment
        run: |
          sed -i 's|<base href="/" />|<base href="/FCOldBoysTeamSelector/dev/" />|g' publish/wwwroot/index.html
          sed -i 's|var base = "/FCOldBoysTeamSelector";|var base = "/FCOldBoysTeamSelector/dev";|g' publish/wwwroot/404.html

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Deploy DEV to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish/wwwroot
          destination_dir: dev

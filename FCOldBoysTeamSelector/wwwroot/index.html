<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FC Old Boys Team Selector</title>
    <base href="/FCOldBoysTeamSelector/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="FCOldBoysTeamSelector.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <!-- SPA redirect: restore path encoded by 404.html -->
    <script type="text/javascript">
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&');
                });
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded[0] +
                    (decoded.slice(1).join('&') ? '?' + decoded.slice(1).join('&') : '') +
                    l.hash
                );
            }
        }(window.location));
    </script>
</head>
<body>
    <div id="app">Loading...</div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="clipboard.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>

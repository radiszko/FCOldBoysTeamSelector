<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FC Old Boys Team Selector v1.2.0</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="FCOldBoysTeamSelector.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <!-- SPA redirect: restore path encoded by 404.html -->
</head>
<body>
    <div id="app">Loading...</div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="clipboard.js"></script>
    <script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var path = params.get("p");
    if (path) {
      var base = document.querySelector('base').getAttribute('href').replace(/\/$/, '');
      history.replaceState(null, null, base + path + (params.get("q") ? "?" + params.get("q") : "") + window.location.hash);
    }
  })();
</script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
